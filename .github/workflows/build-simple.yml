name: Build (Simple - Linux AMD64 Only)

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    name: Build Backend & Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 构建后端
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download Go dependencies
        run: go mod download

      - name: Build Go backend
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ink-flow -ldflags="-s -w" main.go

      # 构建前端
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            ink-flow-web/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('ink-flow-web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install frontend dependencies
        working-directory: ./ink-flow-web
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: ./ink-flow-web
        run: pnpm build-only

      # 打包发布
      - name: Create release package
        run: |
          mkdir -p release
          cp ink-flow release/
          tar -czf release/ink-flow-backend-linux-amd64.tar.gz ink-flow
          tar -czf release/ink-flow-frontend.tar.gz -C ink-flow-web/dist .
          tar -czf release/ink-flow-full.tar.gz ink-flow ink-flow-web/dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-amd64
          path: |
            release/ink-flow
            release/*.tar.gz
          retention-days: 90

      - name: Show build info
        run: |
          echo "Build completed successfully!"
          echo "Backend binary size: $(du -h release/ink-flow | cut -f1)"
          echo "Frontend dist size: $(du -sh ink-flow-web/dist | cut -f1)"
          ls -lh release/

